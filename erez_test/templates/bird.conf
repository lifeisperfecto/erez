log stderr all;

# Unique 32-bit identifier for this router, used in BGP to
# distinguish routers. Does not need to be a reachable IP;
# it's purely an identifier.
router id {{ id }};

# Monitors network interface state (up/down) so BIRD knows
# which links are available. Required for direct BGP sessions
# since BIRD needs to detect the interface a neighbor is on.
protocol device {}

# Generates connected routes for interface subnets inside BIRD.
# We turn this on only for loopbacks, so metals automatically
# advertise sitelocals which are bound to loopback.
protocol direct {
    ipv4;
    ipv6;
    interface "lo";
}

# Install BIRD routes (BGP-learned, static, etc.) into the
# kernel routing table so the kernel can forward data-plane
# traffic matching those prefixes.
protocol kernel kernel4 {
    ipv4 { export all; };
}
protocol kernel kernel6 {
    ipv6 { export all; };
}

# Static routes for testing. These are injected into BIRD's
# routing table and announced to BGP peers. Routes with a
# real next-hop (via IP or interface) are also installed into
# the kernel for data-plane forwarding. Routes with "blackhole"
# exist only as BGP announcements — the kernel drops matching
# packets rather than forwarding them.
{% if !routes_v4.is_empty() %}
protocol static {
    ipv4 { export all; };
{% for route in routes_v4 %}
    route {{ route }};
{% endfor %}
}
{% endif %}
{% if !routes_v6.is_empty() %}
protocol static {
    ipv6 { export all; };
{% for route in routes_v6 %}
    route {{ route }};
{% endfor %}
}
{% endif %}

{% for peer in peers %}
protocol bgp {{ peer.name }} {
    local port {{ peer.port }} as {{ asn }};
{% match peer.neighbour %}
{% when Neighbour::Ip(addr) %}
    neighbor {{ addr }} port {{ peer.port }} as {{ peer.remote_as }};
{% when Neighbour::Range(net) %}
    neighbor range {{ net }} port {{ peer.port }}  as {{ peer.remote_as }};
    dynamic name "dyn_{{ peer.name }}_";
{% endmatch %}
{% if let Some(iface) = peer.interface%}
    interface "{{ iface }}";
{% endif %}
{% if let Some(delay) = peer.connect_delay_seconds %}
    connect delay time {{ delay }};
{% endif %}
    direct;
    ipv4 {
        import all;
        export all;
        # Allow IPv4 prefixes to use IPv6 next-hops (RFC 5549).
        extended next hop;
{% if peer.add_paths_tx %}
        # Advertise multiple paths for the same prefix.
        add paths tx;
{% endif %}
{% if peer.next_hop_keep_ebgp %}
        # Preserve the original eBGP nexthop instead of rewriting
        # to self, so erezd is aware of distinct nexthops instead
        # of only seeing the edge router.
        next hop keep ebgp;
{% endif %}
{% if peer.next_hop_self %}
        # Rewrite nexthops for normal metal BIRD peers; they cannot
        # directly reach external inter-router nexthops.
        next hop self;
{% endif %}
    };
    ipv6 {
        import all;
        export all;
{% if peer.add_paths_tx %}
        add paths tx;
{% endif %}
{% if peer.next_hop_keep_ebgp %}
        next hop keep ebgp;
{% endif %}
{% if peer.next_hop_self %}
        next hop self;
{% endif %}
    };
}
{% endfor %}
